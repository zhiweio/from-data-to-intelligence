site_name: 从数据到智能：企业级数据平台的构建、演进与 Agentic BI 实践
site_description: 一个数据开发的八年数据工程手记：从 0 到 1 构建企业级医药数据平台，再到 Data + AI 转型下的 Agentic BI。
site_author: zhiweio
site_url: https://zhiweio.github.io/from-data-to-intelligence/
repo_name: zhiweio/from-data-to-intelligence
repo_url: https://github.com/zhiweio/from-data-to-intelligence
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: blue
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    admonition:
      note: material/information-outline
      abstract: material/clock-outline
      info: material/map-marker
      tip: material/lightbulb
      success: material/check-circle
      question: material/help-circle
      warning: material/alert
      failure: material/alarm-light
      danger: material/fire
      bug: material/bug
      example: material/format-list-bulleted
      quote: material/book-open

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

validation:
  links:
    not_found: ignore
    unrecognized_links: ignore
    absolute_links: relative_to_docs

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/zhiweio/from-data-to-intelligence
      name: GitHub Repository
  generator: false

extra_javascript:
  - javascripts/blueprint-icons.js
  - https://cdn.jsdelivr.net/npm/mermaid@11.15.0/dist/mermaid.min.js

extra_css:
  - stylesheets/figure-caption.css

